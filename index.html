<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Developer Explorer | Cyberpunk Edition</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      scroll-behavior: smooth;
    }

    /* Definir fontes customizadas */
    :root {
      --font-futuristic: 'Orbitron', sans-serif;
      --font-clean: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --color-primary: #050816;
      --color-cyan: #00F5FF;
      --color-purple: #7C3AED;
      --color-pink: #FF00C8;
      --color-white: #E2E8F0;
    }

    body {
      background: var(--color-primary);
      background-attachment: fixed;
      font-family: var(--font-clean);
      color: var(--color-white);
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND COM PARTÍCULAS ===== */
    .bg-particles {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.8), transparent);
      border-radius: 50%;
    }

    .grid-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0% { transform: translateY(0); }
      100% { transform: translateY(50px); }
    }

    /* ===== GRADIENTES E EFEITOS NEON ===== */
    .gradient-text-cyan {
      background: linear-gradient(135deg, var(--color-cyan) 0%, #00B8D4 50%, var(--color-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glowText 3s ease-in-out infinite;
    }

    .gradient-text-purple {
      background: linear-gradient(135deg, var(--color-purple) 0%, var(--color-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes glowText {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 30px rgba(0, 245, 255, 0.8)); }
    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), 0 0 40px rgba(0, 245, 255, 0.1);
      transition: all 0.3s ease;
    }

    .neon-glow:hover {
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.6), 0 0 60px rgba(0, 245, 255, 0.3);
    }

    /* ===== GLASSMORPHISM ===== */
    .glass-card {
      background: rgba(5, 8, 22, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 245, 255, 0.15);
      border-radius: 16px;
      box-shadow: 
        0 8px 32px 0 rgba(0, 245, 255, 0.1),
        inset 0 1px 2px rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .glass-card:hover {
      background: rgba(5, 8, 22, 0.5);
      border: 1px solid rgba(0, 245, 255, 0.3);
      box-shadow: 
        0 8px 32px 0 rgba(0, 245, 255, 0.2),
        inset 0 1px 2px rgba(255, 255, 255, 0.1);
      transform: translateY(-8px);
    }

    .glass-border {
      border: 2px solid transparent;
      background: linear-gradient(rgba(5, 8, 22, 0.6), rgba(5, 8, 22, 0.6)) padding-box,
                  linear-gradient(135deg, var(--color-cyan), var(--color-purple), var(--color-pink)) border-box;
    }

    /* ===== BOTÕES CYBERPUNK ===== */
    .btn-neon {
      position: relative;
      background: linear-gradient(135deg, var(--color-cyan), var(--color-purple));
      border: 2px solid var(--color-cyan);
      color: var(--color-primary);
      font-weight: 700;
      font-family: var(--font-futuristic);
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 32px;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
    }

    .btn-neon::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      transition: left 0.6s ease;
      z-index: 1;
    }

    .btn-neon:hover::before {
      left: 100%;
    }

    .btn-neon:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 
        0 0 40px rgba(0, 245, 255, 0.6),
        0 0 80px rgba(124, 58, 237, 0.4),
        inset 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .btn-neon:active {
      transform: translateY(-2px);
    }

    /* ===== INPUTS ===== */
    .input-neon {
      background: rgba(5, 8, 22, 0.6);
      border: 2px solid rgba(0, 245, 255, 0.3);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--color-white);
      font-family: var(--font-clean);
      font-size: 16px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .input-neon::placeholder {
      color: rgba(0, 245, 255, 0.5);
    }

    .input-neon:focus {
      outline: none;
      border: 2px solid var(--color-cyan);
      background: rgba(5, 8, 22, 0.8);
      box-shadow: 
        0 0 20px rgba(0, 245, 255, 0.4),
        inset 0 0 10px rgba(0, 245, 255, 0.05);
    }

    /* ===== ANIMAÇÕES ===== */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    @keyframes pulse-neon {
      0%, 100% { 
        box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), 0 0 40px rgba(0, 245, 255, 0.1);
      }
      50% { 
        box-shadow: 0 0 40px rgba(0, 245, 255, 0.6), 0 0 80px rgba(0, 245, 255, 0.3);
      }
    }

    @keyframes scan-line {
      0% { top: 0; }
      100% { top: 100%; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.8; }
    }

    @keyframes neon-border {
      0% { border-color: var(--color-cyan); }
      50% { border-color: var(--color-purple); }
      100% { border-color: var(--color-cyan); }
    }

    @keyframes tilt {
      0%, 100% { transform: rotateX(0deg) rotateY(0deg); }
      50% { transform: rotateX(2deg) rotateY(2deg); }
    }

    @keyframes type {
      0% { width: 0; }
      100% { width: 100%; }
    }

    .float { animation: float 4s ease-in-out infinite; }
    .pulse-neon { animation: pulse-neon 3s ease-in-out infinite; }
    .flicker { animation: flicker 0.15s infinite; }

    /* ===== HERO SECTION ===== */
    .hero-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 2;
    }

    .hero-content {
      text-align: center;
      z-index: 10;
      max-width: 900px;
      padding: 40px 20px;
    }

    .hero-title {
      font-family: var(--font-futuristic);
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: rgba(0, 245, 255, 0.8);
      font-family: var(--font-mono);
      margin-bottom: 40px;
      font-weight: 500;
      letter-spacing: 3px;
    }

    .terminal-box {
      background: rgba(5, 8, 22, 0.8);
      border: 2px solid var(--color-cyan);
      border-radius: 12px;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--color-cyan);
      margin: 40px auto;
      max-width: 600px;
      text-align: left;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
    }

    .terminal-line {
      display: flex;
      align-items: center;
      height: 24px;
      margin: 5px 0;
    }

    .terminal-prompt {
      color: var(--color-pink);
      margin-right: 8px;
      font-weight: bold;
    }

    .terminal-text {
      overflow: hidden;
      white-space: nowrap;
    }

    /* ===== CARDS PROFILE ===== */
    .profile-card {
      position: relative;
      perspective: 1000px;
      transition: transform 0.4s ease;
    }

    .profile-card:hover {
      transform: translateY(-12px) rotateY(2deg);
    }

    .avatar-ring {
      position: relative;
      display: inline-block;
      width: 160px;
      height: 160px;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      background: conic-gradient(var(--color-cyan), var(--color-purple), var(--color-pink), var(--color-cyan));
      border-radius: 50%;
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      background: var(--color-primary);
      border-radius: 50%;
      z-index: 1;
    }

    .avatar-ring img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid var(--color-cyan);
      object-fit: cover;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .stat-box {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(124, 58, 237, 0.05));
      border: 1px solid rgba(0, 245, 255, 0.2);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-box:hover {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(124, 58, 237, 0.1));
      border: 1px solid var(--color-cyan);
      transform: scale(1.08);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--color-cyan);
      font-family: var(--font-futuristic);
    }

    .stat-label {
      font-size: 11px;
      color: rgba(0, 245, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 5px;
    }

    /* ===== REPO CARDS ===== */
    .repo-card {
      glass-card position: relative;
      background: rgba(5, 8, 22, 0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 245, 255, 0.15);
      border-radius: 12px;
      padding: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      display: block;
      text-decoration: none;
      color: inherit;
      height: 100%;
    }

    .repo-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.1), transparent);
      transition: all 0.4s ease;
    }

    .repo-card:hover {
      background: rgba(5, 8, 22, 0.7);
      border: 1px solid rgba(0, 245, 255, 0.4);
      transform: translateY(-8px) scale(1.02);
      box-shadow: 
        0 20px 40px rgba(0, 245, 255, 0.15),
        inset 0 1px 2px rgba(255, 255, 255, 0.05);
    }

    .repo-card:hover::before {
      top: -25%;
      right: -25%;
    }

    .repo-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-cyan);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .repo-description {
      font-size: 14px;
      color: rgba(226, 232, 240, 0.7);
      margin-bottom: 12px;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    .repo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      position: relative;
      z-index: 1;
    }

    .repo-tag {
      background: rgba(0, 245, 255, 0.15);
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: var(--color-cyan);
      padding: 4px 8px;
      border-radius: 6px;
      font-family: var(--font-mono);
      transition: all 0.3s ease;
    }

    .repo-tag:hover {
      background: rgba(0, 245, 255, 0.25);
      border-color: var(--color-cyan);
    }

    /* ===== LOADING & ERROR ===== */
    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(0, 245, 255, 0.2);
      border-top: 3px solid var(--color-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .error-box {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(220, 38, 38, 0.1));
      border: 2px solid rgba(239, 68, 68, 0.5);
      border-radius: 12px;
      padding: 20px;
      color: #ff6b6b;
      text-align: center;
      font-weight: 600;
    }

    /* ===== RESPONSIVIDADE ===== */
    @media (max-width: 768px) {
      .hero-title {
        margin-bottom: 15px;
      }

      .terminal-box {
        max-width: 95vw;
        font-size: 12px;
      }

      .float {
        animation: none;
      }

      .hero-section {
        min-height: 90vh;
      }

      .grid-bg {
        background-size: 30px 30px;
      }
    }

    /* ===== LINHA DECORATIVA ===== */
    .hud-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, var(--color-cyan), transparent);
      pointer-events: none;
    }

    .hud-line-horizontal {
      width: 100%;
      height: 2px;
      left: 0;
    }

    .hud-line-vertical {
      width: 2px;
      height: 100%;
      top: 0;
    }

    /* ===== SEÇÃO TITLE ===== */
    .section-title {
      font-family: var(--font-futuristic);
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin-bottom: 10px;
      position: relative;
      display: inline-block;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 60%;
      height: 4px;
      background: linear-gradient(90deg, var(--color-cyan), var(--color-purple), transparent);
      border-radius: 2px;
    }

    .section-subtitle {
      font-size: 1.1rem;
      color: rgba(0, 245, 255, 0.7);
      font-weight: 500;
      margin-top: 15px;
    }

    /* ===== CONTENT WRAPPER ===== */
    .content-wrapper {
      position: relative;
      z-index: 3;
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* ===== SIMILAR USERS ===== */
    .user-card {
      glass-card position: relative;
      overflow: hidden;
      padding: 24px;
      transition: all 0.4s ease;
      display: flex;
      flex-direction: column;
    }

    .user-card:hover {
      background: rgba(5, 8, 22, 0.7);
      border: 1px solid rgba(0, 245, 255, 0.3);
      transform: translateY(-12px);
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      margin: 0 auto 15px;
      position: relative;
      border: 3px solid var(--color-cyan);
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-cyan);
      text-align: center;
      margin-bottom: 5px;
    }

    .user-login {
      font-size: 12px;
      color: rgba(0, 245, 255, 0.6);
      text-align: center;
      font-family: var(--font-mono);
      margin-bottom: 12px;
    }

    .user-bio {
      font-size: 13px;
      color: rgba(226, 232, 240, 0.6);
      text-align: center;
      margin-bottom: 15px;
      line-height: 1.4;
      flex-grow: 1;
    }

    .user-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }

    .user-stat {
      background: rgba(0, 245, 255, 0.08);
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid var(--color-cyan);
      text-align: center;
    }

    .user-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-cyan);
    }

    .user-stat-label {
      font-size: 10px;
      color: rgba(0, 245, 255, 0.6);
      margin-top: 2px;
    }

  </style>
</head>

<body>

  <!-- Background Grid -->
  <div class="grid-bg"></div>

  <!-- Particles Background -->
  <div class="bg-particles" id="particles"></div>

  <!-- Main Content -->
  <div class="min-h-screen relative">

    <!-- HERO SECTION -->
    <section class="hero-section">
      <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-1/4 left-1/2 w-96 h-96 bg-cyan-500/20 rounded-full filter blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full filter blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
      </div>

      <div class="hero-content">
        <!-- Título Principal -->
        <h1 class="hero-title gradient-text-cyan float">
          <i class="fas fa-code-branch mr-3"></i>GITHUB<br>DEVELOPER<br>EXPLORER
        </h1>

        <!-- Subtitle -->
        <p class="hero-subtitle">
          <span class="inline-block">$_</span> Discover. Analyze. Connect.
        </p>

        <!-- Terminal Box com animação -->
        <div class="terminal-box">
          <div class="terminal-line">
            <span class="terminal-prompt">&gt;</span>
            <span class="terminal-text" style="animation: type 2s steps(50, end) forwards;">Iniciando Explorer...</span>
          </div>
          <div class="terminal-line" style="animation-delay: 2s; opacity: 0;" id="terminal-line-2">
            <span class="terminal-prompt">&gt;</span>
            <span>Sistema de Busca: ONLINE</span>
          </div>
          <div class="terminal-line" style="animation-delay: 4s; opacity: 0;" id="terminal-line-3">
            <span class="terminal-prompt">&gt;</span>
            <span>API GitHub: CONECTADO</span>
          </div>
          <div class="terminal-line" style="animation-delay: 6s; opacity: 0;" id="terminal-line-4">
            <span class="terminal-prompt">&gt;</span>
            <span class="flicker">Pronto para buscar...</span>
          </div>
        </div>

        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center mt-12">
          <button class="btn-neon" onclick="document.getElementById('search-section').scrollIntoView({ behavior: 'smooth' });">
            <i class="fas fa-search mr-2"></i>Iniciar Busca
          </button>
          <a href="https://github.com/Theo-Prado/Mini-Hackathon" target="_blank" class="btn-neon" style="background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(124, 58, 237, 0.2)); border-color: rgba(0, 245, 255, 0.5); color: var(--color-white);">
            <i class="fab fa-github mr-2"></i>Ver Projeto
          </a>
        </div>
      </div>
    </section>

    <!-- SEARCH SECTION -->
    <section class="content-wrapper" id="search-section">
      <div class="glass-border rounded-2xl p-1 mb-16">
        <div class="glass-card rounded-xl p-8 backdrop-blur-xl">
          <div class="flex flex-col gap-4">
            <div>
              <label class="block text-sm font-bold text-cyan-400 uppercase tracking-widest mb-3">
                <i class="fas fa-terminal mr-2"></i>GitHub Username
              </label>
              <input
                id="username"
                type="text"
                placeholder="octocat | torvalds | gvanrossum ..."
                class="input-neon w-full text-lg"
              >
            </div>
            <button
              id="searchBtn"
              class="btn-neon w-full sm:w-auto"
            >
              <i class="fas fa-search mr-2"></i>Execute Search
            </button>
          </div>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading" class="hidden text-center py-20">
        <div class="inline-block mb-6">
          <div class="spinner"></div>
        </div>
        <p class="text-cyan-400 text-xl font-semibold">Scanning GitHub Database...</p>
      </div>

      <!-- Error Banner -->
      <div id="error" class="hidden error-box mb-8"></div>

      <!-- Content Container -->
      <div id="content"></div>
    </section>

  </div>

  <script>
    // Criar partículas no background
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = window.innerWidth > 768 ? 50 : 20;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 4 + 1;
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        
        particlesContainer.appendChild(particle);

        // Animar partícula
        gsap.to(particle, {
          y: y + Math.random() * 200 - 100,
          x: x + Math.random() * 200 - 100,
          opacity: Math.random() * 0.5,
          duration: Math.random() * 20 + 10,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut'
        });
      }
    }

    // Animar linhas do terminal
    function animateTerminal() {
      const lines = [
        document.getElementById('terminal-line-2'),
        document.getElementById('terminal-line-3'),
        document.getElementById('terminal-line-4')
      ];

      lines.forEach((line, index) => {
        gsap.to(line, {
          opacity: 1,
          duration: 0.5,
          delay: 2 + (index * 2)
        });
      });
    }

    // Buscar usuário
    async function buscarUsuario() {
      const username = document.getElementById('username').value.trim();
      const loadingDiv = document.getElementById('loading');
      const contentDiv = document.getElementById('content');
      const errorDiv = document.getElementById('error');

      errorDiv.classList.add('hidden');
      errorDiv.textContent = '';

      if (!username) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i>Por favor, digite um nome de usuário!';
        errorDiv.classList.remove('hidden');
        return;
      }

      try {
        loadingDiv.classList.remove('hidden');
        contentDiv.innerHTML = '';

        const response = await fetch(`https://api.github.com/users/${username}`);

        if (!response.ok) {
          throw new Error('❌ Usuário não encontrado no GitHub');
        }

        const user = await response.json();

        const reposResponse = await fetch(
          `https://api.github.com/users/${username}/repos?sort=stars&order=desc&per_page=6`
        );
        const repos = await reposResponse.json();

        const similarUsers = await buscarPerfisParecidos(user, repos);

        loadingDiv.classList.add('hidden');

        renderizarUsuario(user, repos, similarUsers);
      } catch (error) {
        loadingDiv.classList.add('hidden');
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i>${error.message}`;
        errorDiv.classList.remove('hidden');
      }
    }

    // Buscar perfis parecidos
    async function buscarPerfisParecidos(user, repos) {
      try {
        const linguagensComuns = extrairLinguagensComuns(repos);
        const queries = [];

        if (user.location && user.location.trim()) {
          queries.push(`location:"${user.location}" followers:>10 repos:>2`);
        }

        if (linguagensComuns.length > 0) {
          const linguagem = linguagensComuns[0];
          queries.push(`language:${linguagem} followers:>10 repos:>2`);
        }

        const minSeguidores = Math.max(Math.floor(user.followers * 0.5), 1);
        const maxSeguidores = Math.ceil(user.followers * 2);
        queries.push(`followers:${minSeguidores}..${maxSeguidores} repos:>2`);

        let usuariosPaRecidos = [];

        for (const query of queries) {
          if (usuariosPaRecidos.length >= 6) break;

          try {
            const response = await fetch(
              `https://api.github.com/search/users?q=${encodeURIComponent(query)}&sort=followers&order=desc&per_page=6`
            );

            if (response.ok) {
              const data = await response.json();
              const items = data.items || [];

              for (const usuario of items) {
                if (
                  usuario.login !== user.login &&
                  !usuariosPaRecidos.find((u) => u.login === usuario.login)
                ) {
                  const userFullData = await fetch(`https://api.github.com/users/${usuario.login}`);
                  const userFull = await userFullData.json();
                  usuariosPaRecidos.push(userFull);

                  if (usuariosPaRecidos.length >= 6) break;
                }
              }
            }
          } catch (e) {
            console.log('Erro ao buscar variação:', e);
          }
        }

        return usuariosPaRecidos.slice(0, 6);
      } catch (error) {
        console.log('Erro ao buscar perfis parecidos:', error);
        return [];
      }
    }

    // Extrair linguagens comuns
    function extrairLinguagensComuns(repos) {
      const linguagens = {};

      repos.forEach((repo) => {
        if (repo.language) {
          linguagens[repo.language] = (linguagens[repo.language] || 0) + 1;
        }
      });

      return Object.keys(linguagens)
        .sort((a, b) => linguagens[b] - linguagens[a])
        .slice(0, 3);
    }

    // Renderizar usuário
    function renderizarUsuario(user, repos, similarUsers = []) {
      const contentDiv = document.getElementById('content');

      contentDiv.innerHTML = `
        <!-- PROFILE HEADER -->
        <div class="mb-20">
          <div class="text-center mb-16">
            <h2 class="section-title gradient-text-cyan mb-4">
              <i class="fas fa-user-circle mr-3"></i>Developer Profile
            </h2>
            <p class="section-subtitle">
              Perfil de <span class="font-bold text-cyan-400">${user.name || user.login}</span>
            </p>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Profile Card -->
            <div class="lg:col-span-1">
              <div class="glass-card rounded-xl p-8 neon-glow profile-card">
                <div class="text-center">
                  <div class="avatar-ring mb-6">
                    <img src="${user.avatar_url}" alt="${user.login}" />
                  </div>
                  <h3 class="text-2xl font-bold text-cyan-400 mb-2">${user.name || user.login}</h3>
                  <p class="text-sm text-cyan-300 font-mono mb-6">@${user.login}</p>
                  ${user.bio ? `<p class="text-sm text-gray-300 italic mb-6">"${user.bio}"</p>` : ''}
                  <a href="${user.html_url}" target="_blank" class="btn-neon w-full justify-center">
                    <i class="fas fa-arrow-up-right-from-square mr-2"></i>Visitar GitHub
                  </a>
                </div>
              </div>

              <!-- Stats Card -->
              <div class="glass-card rounded-xl p-6 mt-6 neon-glow">
                <h4 class="text-lg font-bold text-cyan-400 mb-6">
                  <i class="fas fa-chart-line mr-2"></i>Estatísticas
                </h4>
                <div class="stats-grid">
                  <div class="stat-box">
                    <div class="stat-value">${user.followers.toLocaleString('pt-BR')}</div>
                    <div class="stat-label">Followers</div>
                  </div>
                  <div class="stat-box">
                    <div class="stat-value">${user.following.toLocaleString('pt-BR')}</div>
                    <div class="stat-label">Following</div>
                  </div>
                  <div class="stat-box">
                    <div class="stat-value">${user.public_repos.toLocaleString('pt-BR')}</div>
                    <div class="stat-label">Repos</div>
                  </div>
                </div>
                ${user.location ? `
                  <div class="mt-6 pt-6 border-t border-cyan-400/20">
                    <p class="text-xs text-cyan-400/70 uppercase tracking-widest mb-2">Location</p>
                    <p class="text-cyan-400 font-semibold">
                      <i class="fas fa-map-marker-alt mr-2"></i>${user.location}
                    </p>
                  </div>
                ` : ''}
              </div>
            </div>

            <!-- Repositories Section -->
            <div class="lg:col-span-2">
              <div class="glass-card rounded-xl p-8 neon-glow">
                <h4 class="text-2xl font-bold text-cyan-400 mb-8">
                  <i class="fas fa-code mr-2"></i>Featured Repositories
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  ${repos
                    .map(
                      (repo) => `
                    <a href="${repo.html_url}" target="_blank" class="repo-card group">
                      <div class="flex items-start justify-between mb-3 gap-2">
                        <h5 class="repo-title">
                          <i class="fas fa-folder-open"></i>
                          <span class="truncate">${repo.name}</span>
                        </h5>
                        ${repo.private ? `<span class="text-xs bg-red-500/30 text-red-300 px-2 py-1 rounded whitespace-nowrap">Private</span>` : `<span class="text-xs bg-green-500/30 text-green-300 px-2 py-1 rounded whitespace-nowrap">Public</span>`}
                      </div>
                      <p class="repo-description">${repo.description || 'Sem descrição disponível'}</p>
                      <div class="repo-meta">
                        ${repo.language ? `<span class="repo-tag"><i class="fas fa-code mr-1"></i>${repo.language}</span>` : ''}
                        <span class="repo-tag text-yellow-400 border-yellow-400/30 bg-yellow-500/10">
                          <i class="fas fa-star mr-1"></i>${repo.stargazers_count}
                        </span>
                        <span class="repo-tag text-blue-400 border-blue-400/30 bg-blue-500/10">
                          <i class="fas fa-code-branch mr-1"></i>${repo.forks_count}
                        </span>
                      </div>
                    </a>
                  `
                    )
                    .join('')}
                </div>
              </div>
            </div>
          </div>
        </div>

        ${
          similarUsers.length > 0
            ? `
        <!-- SIMILAR USERS SECTION -->
        <div class="mt-24 pt-16 border-t border-cyan-400/20">
          <div class="text-center mb-16">
            <h2 class="section-title gradient-text-purple mb-4">
              <i class="fas fa-user-group mr-3"></i>Similar Developers
            </h2>
            <p class="section-subtitle">
              Discover developers with similar interests and experience
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${similarUsers
              .map(
                (similarUser) => `
              <div class="user-card">
                <div class="user-avatar">
                  <img src="${similarUser.avatar_url}" alt="${similarUser.login}" />
                </div>
                <h3 class="user-name">${similarUser.name || similarUser.login}</h3>
                <p class="user-login">@${similarUser.login}</p>
                ${similarUser.bio ? `<p class="user-bio">"${similarUser.bio}"</p>` : '<p class="user-bio opacity-50">Sem bio</p>'}
                
                <div class="user-stats">
                  <div class="user-stat">
                    <div class="user-stat-value">${similarUser.followers > 999 ? (similarUser.followers / 1000).toFixed(1) + 'k' : similarUser.followers}</div>
                    <div class="user-stat-label">Followers</div>
                  </div>
                  <div class="user-stat">
                    <div class="user-stat-value">${similarUser.public_repos}</div>
                    <div class="user-stat-label">Repos</div>
                  </div>
                  <div class="user-stat">
                    <div class="user-stat-value">${similarUser.following}</div>
                    <div class="user-stat-label">Following</div>
                  </div>
                </div>

                <a href="${similarUser.html_url}" target="_blank" class="btn-neon w-full justify-center text-sm py-2">
                  <i class="fas fa-arrow-up-right-from-square mr-2"></i>View Profile
                </a>
              </div>
            `
              )
              .join('')}
          </div>
        </div>
        `
            : ''
        }
      `;
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      animateTerminal();

      const button = document.getElementById('searchBtn');
      const input = document.getElementById('username');

      button.onclick = buscarUsuario;

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          buscarUsuario();
        }
      });
    });

    // Handle resize
    window.addEventListener('resize', () => {
      document.getElementById('particles').innerHTML = '';
      createParticles();
    });
  </script>

</body>
</html>
